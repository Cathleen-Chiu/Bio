<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>邱子菱 | 數位名片</title>
    
    <!-- iOS Web App 元數據 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="子菱名片">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'theme-dark': 'var(--text-dark, #1A0F0D)',
                        'theme-muted': 'var(--text-muted, #5D4A44)',
                        'theme-accent': 'var(--accent-color, #C6A796)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-base: #F5EBE0;
            --grad-1: rgba(237, 220, 210, 0.9);
            --grad-2: rgba(219, 181, 181, 0.6);
            --grad-3: rgba(227, 213, 202, 0.8);
            --grad-4: rgba(213, 189, 175, 0.7);
            --text-dark: #1A0F0D;
            --text-muted: #5D4A44;
            --accent-color: #C6A796;
            --card-bg: rgba(255, 255, 255, 0.45);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: all 0.9s ease;
            margin: 0;
            background-color: var(--bg-base);
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-dynamic {
            background-image: 
                radial-gradient(at 0% 0%, var(--grad-1) 0px, transparent 65%),
                radial-gradient(at 100% 0%, var(--grad-2) 0px, transparent 65%),
                radial-gradient(at 100% 100%, var(--grad-3) 0px, transparent 65%),
                radial-gradient(at 0% 100%, var(--grad-4) 0px, transparent 65%);
            background-attachment: fixed;
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .profile-img-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            perspective: 1000px;
        }
        
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .profile-img-container:hover .flip-card-inner,
        .profile-img-container:active .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            border: 5px solid white;
            background-color: #eee;
        }

        .flip-card-back { transform: rotateY(180deg); }

        .profile-img { width: 100%; height: 100%; object-fit: cover; }

        #toast {
            visibility: hidden; opacity: 0;
            position: fixed; left: 50%; transform: translateX(-50%);
            bottom: 40px; background: var(--text-dark); color: white;
            padding: 12px 24px; border-radius: 99px; transition: 0.4s;
            z-index: 100;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 60px; }
    </style>
</head>
<body onclick="changeTheme(event)">

    <div id="toast">EMAIL COPIED ✨</div>
    <div class="bg-dynamic"></div>

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] p-8 sm:p-12 text-center shadow-2xl" onclick="event.stopPropagation(); changeTheme(event)">
        
        <!-- 大頭照區域 -->
        <div class="profile-img-container">
            <div class="flip-card-inner">
                <!-- 正面照片 -->
                <div class="flip-card-front">
                    <img src="data:image/png;base64,REPLACE_THIS_WITH_FRONT_BASE64" 
                         alt="正面" 
                         class="profile-img"
                         onerror="this.style.opacity='0';">
                </div>
                <!-- 背面照片 -->
                <div class="flip-card-back">
                    <img src="data:image/png;base64,REPLACE_THIS_WITH_BACK_BASE64" 
                         alt="背面" 
                         class="profile-img"
                         onerror="this.style.opacity='0';">
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <h1 class="text-3xl font-bold text-theme-dark tracking-tight transition-colors duration-700">邱子菱</h1>
            <p class="text-theme-muted font-semibold text-lg tracking-widest uppercase transition-colors duration-700">National Taiwan University</p>
            <p class="text-theme-muted/70 text-sm font-medium transition-colors duration-700">國立臺灣大學｜法研所</p>
        </div>

        <div class="my-10 py-8 border-y border-theme-accent/20 transition-colors duration-700">
            <p class="text-theme-muted/60 text-base leading-relaxed tracking-normal font-medium transition-colors duration-700">
                An LL.M. student learning about LLMs.
            </p>
        </div>

        <div class="grid gap-4">
            <a href="https://www.instagram.com/veggingout___?igsh=MjY5eHN1Nnd0M2dj&utm_source=qr" target="_blank" onclick="event.stopPropagation()" class="block w-full py-4 rounded-2xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700">Instagram</a>
            <a href="https://www.threads.com/@veggingout___?igshid=NTc4MTIwNjQ2YQ==" target="_blank" onclick="event.stopPropagation()" class="block w-full py-4 rounded-2xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700">Threads</a>
            <button onclick="event.stopPropagation(); copyAndEmail('r11a21030@ntu.edu.tw')" class="block w-full py-4 rounded-2xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700">Email</button>
        </div>

        <footer class="mt-14">
            <div class="text-[9px] text-theme-muted/40 font-bold tracking-[0.4em] uppercase">Digital Presence</div>
        </footer>
    </div>

    <script>
        const themes = [
            { name: 'Dusty Rose', '--bg-base': '#D1A7A7', '--grad-1': 'rgba(209, 167, 167, 1)', '--grad-2': 'rgba(235, 215, 215, 0.6)', '--grad-3': 'rgba(209, 167, 167, 0.8)', '--grad-4': 'rgba(180, 140, 140, 0.4)', '--text-dark': '#3E2723', '--text-muted': '#5D4037', '--accent-color': '#A67C7C', '--card-bg': 'rgba(255, 255, 255, 0.55)' },
            { name: 'Classic Milk Tea', '--bg-base': '#F5EBE0', '--grad-1': 'rgba(237, 220, 210, 0.9)', '--grad-2': 'rgba(219, 181, 181, 0.6)', '--grad-3': 'rgba(227, 213, 202, 0.8)', '--grad-4': 'rgba(213, 189, 175, 0.7)', '--text-dark': '#1A0F0D', '--text-muted': '#5D4A44', '--accent-color': '#C6A796', '--card-bg': 'rgba(255, 255, 255, 0.45)' },
            { name: 'Midnight Navy', '--bg-base': '#1A2A4E', '--grad-1': 'rgba(26, 42, 78, 1)', '--grad-2': 'rgba(184, 143, 42, 0.15)', '--grad-3': 'rgba(26, 42, 78, 1)', '--grad-4': 'rgba(255, 255, 255, 0.05)', '--text-dark': '#E5C07B', '--text-muted': '#AAB2C0', '--accent-color': '#B88F2A', '--card-bg': 'rgba(25, 38, 66, 0.7)' },
            { name: 'Sage Matcha', '--bg-base': '#E2E6E1', '--grad-1': 'rgba(167, 181, 163, 0.4)', '--grad-2': 'rgba(215, 221, 212, 0.5)', '--grad-3': 'rgba(190, 201, 186, 0.4)', '--grad-4': 'rgba(145, 158, 142, 0.3)', '--text-dark': '#2B332A', '--text-muted': '#556153', '--accent-color': '#A7B5A3', '--card-bg': 'rgba(255, 255, 255, 0.5)' }
        ];
        let currentThemeIndex = 0;
        function changeTheme(e) {
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const theme = themes[currentThemeIndex];
            const root = document.documentElement;
            Object.keys(theme).forEach(key => { if (key !== 'name') root.style.setProperty(key, theme[key]); });
        }
        function copyAndEmail(email) {
            const el = document.createElement('textarea');
            el.value = email; document.body.appendChild(el);
            el.select(); document.execCommand('copy'); document.body.removeChild(el);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; setTimeout(() => window.location.href = "mailto:" + email, 400); }, 1200);
        }
    </script>
</body>
</html>
