<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 viewport-fit=cover 以支援 iPhone 瀏海與底部橫條 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>邱子菱 | 數位名片</title>
    
    <!-- iOS Web App 功能核心標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="子菱名片">
    
    <!-- PWA 圖示預留（若有 Base64 圖示可填入，目前使用預設） -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23D1A7A7%22/></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    colors: {
                        'theme-dark': 'var(--text-dark, #1A0F0D)',
                        'theme-muted': 'var(--text-muted, #5D4A44)',
                        'theme-accent': 'var(--accent-color, #C6A796)',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            /* 預設主題：經典奶茶色 */
            --bg-base: #F5EBE0;
            --grad-1: rgba(237, 220, 210, 0.9);
            --grad-2: rgba(219, 181, 181, 0.6);
            --grad-3: rgba(227, 213, 202, 0.8);
            --grad-4: rgba(213, 189, 175, 0.7);
            --text-dark: #1A0F0D;
            --text-muted: #5D4A44;
            --accent-color: #C6A796;
            --card-bg: rgba(255, 255, 255, 0.45);
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: all 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0;
            overflow: hidden; /* 防止 iOS 橡皮筋回彈效果 */
            background-color: var(--bg-base);
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            height: 100vh;
            /* 支援 iOS 安全區域 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .bg-dynamic {
            background-image: 
                radial-gradient(at 0% 0%, var(--grad-1) 0px, transparent 65%),
                radial-gradient(at 100% 0%, var(--grad-2) 0px, transparent 65%),
                radial-gradient(at 100% 100%, var(--grad-3) 0px, transparent 65%),
                radial-gradient(at 0% 100%, var(--grad-4) 0px, transparent 65%);
            background-attachment: fixed;
            min-height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.9s ease;
        }

        /* 針對 iOS 點擊回饋優化 */
        .btn-hover-effect:active {
            transform: scale(0.97);
            opacity: 0.9;
            background-color: rgba(255, 255, 255, 0.8);
        }

        #toast {
            visibility: hidden;
            min-width: 220px;
            background: var(--text-dark);
            color: white;
            text-align: center;
            border-radius: 99px;
            padding: 14px 28px;
            position: fixed;
            z-index: 100;
            left: 50%;
            transform: translateX(-50%);
            bottom: calc(40px + env(safe-area-inset-bottom));
            font-size: 13px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #toast.show { visibility: visible; opacity: 1; bottom: calc(60px + env(safe-area-inset-bottom)); }

        .profile-img-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 2rem;
            perspective: 1000px;
        }
        
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* iOS 支援 active 狀態觸發 3D 翻轉 */
        .profile-img-container:hover .flip-card-inner,
        .profile-img-container:active .flip-card-inner {
            transform: rotateY(180deg);
        }

        /* Mobile/Touch: keep flip state after tapping */
        .profile-img-container.is-flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background-color: #fff;
        }

        .flip-card-back { transform: rotateY(180deg); }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="toast">EMAIL COPIED ✨</div>

    <div class="bg-dynamic">
        <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.1)] p-8 sm:p-12 text-center">
            
            <!-- 大頭照區域 (支援 iOS 觸控翻轉) -->
            <div class="profile-img-container">
                <div class="absolute inset-0 bg-white/30 rounded-full blur-3xl opacity-50"></div>
                <div class="flip-card-inner">
                    <div class="flip-card-front">
                        <!-- 請在此貼上正面 Base64 -->
                        <img src="data:image/png;base64,PASTE_FRONT_BASE64" 
                             alt="正面" 
                             class="profile-img"
                             onerror="this.style.display='none';">
                    </div>
                    <div class="flip-card-back">
                        <!-- 請在此貼上背面 Base64 -->
                        <img src="data:image/png;base64,PASTE_BACK_BASE64" 
                             alt="背面" 
                             class="profile-img"
                             onerror="this.style.display='none';">
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <h1 class="text-3xl font-bold text-theme-dark tracking-tight transition-colors duration-700">
                    邱子菱
                </h1>
                <p class="text-theme-muted font-semibold text-base tracking-widest uppercase transition-colors duration-700">
                    National Taiwan University
                </p>
                <p class="text-theme-muted/70 text-xs font-medium transition-colors duration-700">
                    國立臺灣大學｜法研所
                </p>
            </div>

            <div class="my-8 py-6 border-y border-theme-accent/20 transition-colors duration-700">
                <p class="text-theme-muted/60 text-sm leading-relaxed font-medium transition-colors duration-700">
                    An LL.M. student learning about LLMs.
                </p>
            </div>

            <div class="grid gap-3">
                <a href="https://www.instagram.com/veggingout___?igsh=MjY5eHN1Nnd0M2dj&utm_source=qr" 
                   target="_blank"
                   onclick="event.stopPropagation()"
                   class="btn-hover-effect block w-full py-3.5 px-6 rounded-xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700 text-sm">
                    Instagram
                </a>
                <a href="https://www.threads.com/@veggingout___?igshid=NTc4MTIwNjQ2YQ==" 
                   target="_blank"
                   onclick="event.stopPropagation()"
                   class="btn-hover-effect block w-full py-3.5 px-6 rounded-xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700 text-sm">
                    Threads
                </a>
                <button onclick="event.stopPropagation(); copyAndEmail('r11a21030@ntu.edu.tw')"
                        class="btn-hover-effect block w-full py-3.5 px-6 rounded-xl bg-white/60 text-theme-dark font-semibold border border-white/40 shadow-sm transition-all duration-700 text-sm">
                    Email
                </button>
            </div>

            <footer class="mt-10">
                <div class="text-[8px] text-theme-muted/30 font-bold tracking-[0.5em] uppercase transition-colors duration-700">
                    Digital Presence
                </div>
            </footer>
        </div>
    </div>

    <script>
        const themes = [
            {
                name: 'Dusty Rose',
                '--bg-base': '#D1A7A7',
                '--grad-1': 'rgba(209, 167, 167, 1)',
                '--grad-2': 'rgba(235, 215, 215, 0.6)',
                '--grad-3': 'rgba(209, 167, 167, 0.8)',
                '--grad-4': 'rgba(180, 140, 140, 0.4)',
                '--text-dark': '#3E2723', 
                '--text-muted': '#5D4037',
                '--accent-color': '#A67C7C',
                '--card-bg': 'rgba(255, 255, 255, 0.55)'
            },
            {
                name: 'Classic Milk Tea',
                '--bg-base': '#F5EBE0',
                '--grad-1': 'rgba(237, 220, 210, 0.9)',
                '--grad-2': 'rgba(219, 181, 181, 0.6)',
                '--grad-3': 'rgba(227, 213, 202, 0.8)',
                '--grad-4': 'rgba(213, 189, 175, 0.7)',
                '--text-dark': '#1A0F0D',
                '--text-muted': '#5D4A44',
                '--accent-color': '#C6A796',
                '--card-bg': 'rgba(255, 255, 255, 0.45)'
            },
            {
                name: 'Midnight Navy',
                '--bg-base': '#1A2A4E',
                '--grad-1': 'rgba(26, 42, 78, 1)',
                '--grad-2': 'rgba(184, 143, 42, 0.15)',
                '--grad-3': 'rgba(26, 42, 78, 1)',
                '--grad-4': 'rgba(255, 255, 255, 0.05)',
                '--text-dark': '#E5C07B',
                '--text-muted': '#AAB2C0',
                '--accent-color': '#B88F2A',
                '--card-bg': 'rgba(25, 38, 66, 0.7)'
            },
            {
                name: 'Sage Matcha',
                '--bg-base': '#E2E6E1',
                '--grad-1': 'rgba(167, 181, 163, 0.4)',
                '--grad-2': 'rgba(215, 221, 212, 0.5)',
                '--grad-3': 'rgba(190, 201, 186, 0.4)',
                '--grad-4': 'rgba(145, 158, 142, 0.3)',
                '--text-dark': '#2B332A',
                '--text-muted': '#556153',
                '--accent-color': '#A7B5A3',
                '--card-bg': 'rgba(255, 255, 255, 0.5)'
            }
        ];

        let currentThemeIndex = 0;

        function setThemeByIndex(index) {
            currentThemeIndex = index;
            const theme = themes[currentThemeIndex];
            const root = document.documentElement;
            Object.keys(theme).forEach(key => {
                if (key !== 'name') root.style.setProperty(key, theme[key]);
            });
        }

        function setRandomTheme() {
            if (themes.length <= 1) return;

            // Avoid picking the same theme twice in a row.
            let next = Math.floor(Math.random() * themes.length);
            while (next === currentThemeIndex && themes.length > 1) {
                next = Math.floor(Math.random() * themes.length);
            }
            setThemeByIndex(next);
        }

        function copyAndEmail(email) {
            const el = document.createElement('textarea');
            el.value = email;
            el.setAttribute('readonly', '');
            el.style.position = 'absolute';
            el.style.left = '-9999px';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { 
                toast.className = ""; 
                setTimeout(() => window.location.href = "mailto:" + email, 400);
            }, 1200);
        }

        // Click behavior fixes:
        // - Background/card (everything except buttons + avatar) => random theme immediately.
        // - Avatar => coin-flip (mobile friendly) without changing background theme.
        document.addEventListener('click', function (e) {
            const target = e.target;

            const avatarContainer = target && target.closest ? target.closest('.profile-img-container') : null;
            const toast = document.getElementById('toast');

            // 1) Avatar click: flip only
            if (avatarContainer) {
                    // Desktop: keep the original hover behavior (do not force-flip).
                    // Mobile: momentarily flip (not permanent), so it feels like a tap-and-reveal.
                    const isTouchLike = window.matchMedia && window.matchMedia('(hover: none), (pointer: coarse)').matches;
                    if (isTouchLike) {
                        if (avatarContainer.__flipTimer) {
                            clearTimeout(avatarContainer.__flipTimer);
                        }
                        avatarContainer.classList.add('is-flipped');
                        avatarContainer.__flipTimer = setTimeout(() => {
                            avatarContainer.classList.remove('is-flipped');
                        }, 850); // align with flip transition (0.7s) + small buffer
                    }
                return;
            }

            // 2) Buttons/links: do not change theme (existing onclick may stopPropagation, but we guard anyway)
            if (target && typeof target.closest === 'function') {
                if (target.closest('a, button')) return;
            }

            // 3) Toast: ignore
            if (toast && target && toast.contains(target)) return;

            // 4) Any other area => theme switch immediately
            setRandomTheme();
        }, false);
    </script>
</body>
</html>
